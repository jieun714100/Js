<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        //1. 할당 연산자(산술 - 이항(항이 2개))
        let x = 1;
        let y = 3;

        x = x + y;
        console.log(y); //3
        console.log(x); //4
        x = x - y;
        console.log(x); //1 (: 4-3)
        x = x * y;
        console.log(y); //3
        x = x / y;
        console.log(x); //1
        x = 2;
        y = 3;
        x = x % y;
        console.log(x); //2
        x = x ** y;
        console.log(x); //8

        //2. 복합할당연산자
        x = 3;
        y = 5;

        console.log((x += y)); //3 + 5 = 8 ,8
        console.log((x -= y)); // 8 - 5 = 3 ,3
        console.log((x *= y)); // 3 * 5 = 15 ,15
        console.log((x /= y)); //15 / 5 = 3 ,3
        console.log((x %= y)); //3 % 5 = 3 ,3

        //3. 비교연산자 : == ====, != !==
        let a = 3;
        let b = "3";
        console.log(a == b); //true => 값만 비교
        console.log(a === b); //false => 값과 타입 다 비교 (이걸 더 많이 사용!)

        //4. 산술연산자 : 단항 ++(증가) --(감소) +(숫자화) -(단항부정)
        x = 5;
        y = 6;
        y = ++x; //증가 후 할당
        console.log(x); //6
        console.log(y); //6

        x = 5;
        y = 6;
        y = x++; //할당 후 증가
        console.log(x); //6
        console.log(y); //5

        y = --x; //증가 후 할당
        console.log(x); //5
        console.log(y); //5

        y = x--; //할당 후 증가
        console.log(x); //4
        console.log(y); //5

        //5. 단항부정 연산자 : 부호를 바꿔준다
        x = -3;
        console.log(x); //-3        
        console.log(-x); //3

        //6. 숫자화 연산자
        let z = true;
        console.log(z); //true
        console.log(+z); //1 (=> 문자열로 바꿈)
        x = "3";
        y = "5";
        console.log(x + y); //35

        x = +"3"; // 숫자화
        y = +"5"; // 숫자화
        console.log(x + y); //8

        x = -"3"; // 숫자화
        y = -"5"; // 숫자화
        console.log(x + y); //-8

        //활용 : prompt로 두 수를 입력받아 합을 구하는 코드 작성
        //효율성, 가독성, 결과 확인... 후 부르기
        let num1 = +prompt("첫번째 수"); //'+'연산자를 통해 숫자화 => 효율성을 높임
        let num2 = +prompt("두번째 수");
        console.log("두수의 합:", (num1 + num2));


        //7. 논리 연산자 : 여러가지 조건을 만족시키는지 알아보는 연산자 (and, or)
        // && (and : 둘 다 참 => 참)  
        // || (or : 둘 중 하나만 참 => 참)

        let o = true && false; //false
        console.log(o);
        o = 3 > 2 && 4 > 7; //false
        console.log(o);
        o = 3 > 2 && 8 > 7; //true
        console.log(o);
        o = true || false; //true
        console.log(o);
        o = 3 > 2 || 4 > 7; //true
        console.log(o);
        o = 3 > 4 || 4 < 2 || 2 > 1; //true
        console.log(o);
        //js에서는 논리 연산자에 여러 행을 붙여도 작동한다.


        //8. 문자열 연산자 : + (concate)
        let firstName = "John";
        let lastName = "Bacon";
        let fullName = firstName + " " + lastName;
        console.log(fullName);

        //9. 조건 삼항 연산자
        //let 변수 = 조건 ? 참 : 거짓
        let age = 16;
        let isAdult = age > 20 ? "성인" : "미성년자";
        console.log(isAdult);

        //활용 : 90점 이상이면 "A" 80점 이상이면 "B" 
        //70점 이상이면 "C" 60점 이상이면 "D" 나머지는 "E"

        let score = prompt("점수 입력"); //+가 없어도 js가 문자열과 숫자를 비교해줄 수 있음
        let grade = score >= 90 ? "A" : score >= 80 ? "B" : score >= 70 ? "C" : score >= 60 ? "D" : "E";
        console.log("등급 : ", grade);

    </script>
</body>

</html>
