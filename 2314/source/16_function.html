<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script src="./js/common.js"></script>
    <script>
        /*1.함수 선언식 방식
        - function 함수이름(매개변수...){
            ::
            (return)
        }
        
        - 선언전 호출이 가능
        - 이유? 
        */


        console.log(sum(9, 8)) //호출
        console.log()


        function sum(n1, n2) {
            return n1 + n2;
        }

        function taxAmount(productPrice) {
            let tax = 0.1;
            return tax * productPrice;

            console.log(taxAmount(14500))
        }

        //함수 표현식 방식

        //console.log(sum2(6, 7))
        const sum2 = function (n1, n2) {
            return n1 + n2;
        }
        console.log(sum2(6, 7))

        /*변수 scope(범위)???
        1. 매개변수 : 함수 안
        2. 
        :
        var 변수1? : 전체
        function(){
            var변수? : 함수 안에서만
        }
        */

        /*3. 화살표 함수
        - function 예약어 사용 x
        - (매개변수) =>{ }
        - return문이 있고 실행문이 한 줄인 경우 {} 생략 가능
        */

        const sum3 = (n1, n2) => n1 + n2;
        console.log(sum3(4, 5))

        //과제 : 더할 숫자 2개와 연산자를 입력받아 연산을 실행하는 함수를 작성해보자.


    </script>
</body>

</html>
