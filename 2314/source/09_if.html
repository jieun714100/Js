<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // false : false, 0, null, undefined, NaN

        let age = prompt("나이는?");
        let fee;

        if (age) {
            if (age < 6 || age >= 70) {
                fee = "무료";
            } else if (age < 12) {
                fee = "450원";
            } else if (age < 18) {
                fee = "700원";
            } else {
                fee = "1000원";
            }

            console.log("버스요금 : ", fee)
        } else {
            console.log("값을 입력하세요")
        }



    </script>
</body>

</html>
