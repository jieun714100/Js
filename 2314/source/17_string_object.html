<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let str = "Welcome Seoul";
        //1. property : length
        console.log(str.length);

        //2. indexOf(대상 문자열, 검색 시작 위치) : 찾고자하는 문자열을 하나만 찾고 못찾음, 첫 하나만 => 정규식
        //-1 : 없는 글자
        str = "Welcome Seoul Seoul";
        console.log(str.indexOf("Seoul")) //8
        console.log(str.indexOf("Seoul", 10)) //14 (시작위치 지정)
        console.log(str.indexOf("Jeju")) //-1 (= 없다)


        //활용 과제 : 전화번호 입력시 - : 오류
        let input = "010-0000-0000"

        if (input.indexOf("-") !== -1) {
            console.log("오류")
        } else {
            console.log("성공")
        }


        //3. lastIndexOf : 뒤에서부터 문자열을 찾아 (처음 만나는 것만) 인덱스를 리턴        
        str = "Welcome Seoul";
        console.log(str.lastIndexOf("l")); //12

        //4. ***slice(시작위치, 종료위치) : 문자열의 시작위치에서 종료위치-1 까지 잘라내기***
        //매개변수에 음수가 올 수 있다. => 유연하다.
        console.log(str.slice(8, 13)); //Seoul :12까지
        console.log(str.slice(8)); //Seoul
        console.log(str.slice(0)); //Welcome Seoul
        //서울의 위치를 몰라 indexOf로 Seoul을 찾아야함
        console.log(str.slice(str.indexOf("Seoul"))); //Seoul
        console.log(str.slice(-5)) //Seoul
        console.log(str.slice(-8, -3)) //me Se : -8부터 -4까지


        //5. substring(시작위치, 종료위치) : 문자열의 시작위치에서 종료위치-1 까지 잘라내기 
        //매개변수에 음수가 나오면 0으로 간주
        //오동작 가능성=> 오류가 발생 X
        console.log(str.substring(8, 13)); //Seoul :12까지
        console.log(str.substring(8)); //Seoul
        console.log(str.substring(0)); //Welcome Seoul
        console.log(str.substring(-5)); //0 => Welcome Seoul
        console.log(str.substring(-8, -3)); //X (blank)

        //6. substr(시작위치, 잘라낼 길이) : 문자열을 길이만큼 잘라내기
        //명확하게 잘라낼 길이를 알 경우 유용하다.
        let studentNumber = "2318";
        let grade = studentNumber.substr(0, 1); //1 -> 길이. 한개
        let classN = studentNumber.substr(1, 1);
        let number = studentNumber.substr(2, 2);
        console.log(grade, "학년", classN, "반", number, "번")

        //slice오ㅑㅏ 유사한 함수 :  substring, substr => why?
        //왜 유사한 함수를 많이 만들어 두었을까? 생각해보자.
        //***** slice    vs   substring   vs   substr
        /*  slice : 가장 유연하고 현대적인 메서드, 음수처리가 가능
            substring: slice와 유사하지만 인덱스가 음수인 경우 처리가 다르다 :실무사용 거의x
            substr : 인덱스가 아닌 글자 수를 기준으로 하지만 현재 웹표준으로 권장하지 않는다.(사형선고)*/

        //7. replace(문자열1, 문자열2) : 문자열1을 문자열2로 교체하는 함수
        //str은 변하지 않는다
        str = "Welcome Jeju! Jeju";
        console.log(str.replace("Jeju", "Seoul"))

        //과제 => replaceAll 사용하지 말고 Jeju => Seoul (반복문)
        console.log("replaceAll() 사용하지 말고 Jeju => Seoul (반복문)")
        let newstr = str.replace(/Jeju/g, "Seoul");
        console.log(newstr)

        //8. **toUpperCase() : 대문자로 변환
        //9. **toLowerCase() : 소문자로 변환
        //사용자는 다양하게 입력하게 되므로... 입력된 내용을 대(소)문자로 변환하면된다
        //제품번호 포맷 : 영어대문자제조연월일코드 => M260422DEF
        //m260422DEF m260422def

        str = "Welcome Jeju! Jeju";
        console.log(str.toUpperCase()) //WELCOME JEJU! JEJU
        console.log(str.toLowerCase()) //welcome jeju! jeju


        //10. concat(): 문자열 합치기, 문자열의 갯수는 제한이 없다
        let firstName = "John";
        let lastName = "Doe";
        let fullName = firstName.concat(" ", lastName, "!~~ ", "Welcome");
        console.log(fullName)


        //11. trim() : 문자열의 앞, 뒤 공백을 없애기
        let name = "               에이스???   2학년 3반           "
        console.log(name.trim()) //에이스???   2학년 3반

        //12. *****padStart(문자열 전체 길이, 앞에 채울 문자열)
        //현업에서 가장 많이 사용하고 중요하다. => 동일한 내용을 자스코드로 작성하면 매우 길다
        //월을 2자리로 출력 => 04월, 12월, 01월 ...

        let today = new Date();
        let month = today.getMonth();

        if (+month.length < 2) {
            month.concat("0")
            console.log("0", month, "월")
        } else {
            console.log(month, "월")

        }


        //13. padEnd(문자열 전체길이, 뒤에 채울 문자열)
        let stNumber = "2318";
        //학생일 경우 학번 뒤에 "s"를 붙이자 
        console.log(stNumber.padEnd(5, "s")); // 2318s

        //14. ***charAt(인덱스) : 인덱스에 해당하는 한 글자만 리턴
        stNumber = "s2318";
        //s로 시작하면 학생이다
        if (stNumber.charAt(0).toLowerCase === "s") {
            console.log("학생입니다");
        }

        //15. charCodeAt(인덱스) : 인덱스에 해당하는 글자의 유니코드를 리턴
        //유니코드 한글 첫 글자 : 가 / 마지막 글자 : 힣
        str = "A"
        console.log(str.charCodeAt(0));
        str = "가힣"
        console.log(str.charCodeAt(0)); //44032
        console.log(str.charCodeAt(1)); //55203


        // 16.************split() : 파라미터로 전달받은 문자열을 기준으로 문자열을 쪼갠다.
        //결과는 배열로 반환한다. 현업에서 가장 많이 사용하고 중요하다.
        let jsonEx = "john@gamil.com, lee@gmail.com, kim@hanmail.com";
        let result = jsonEx.split(",")
        console.log(result) //['john@gamil.com', ' lee@gmail.com', ' kim@hanmail.com']

        //17.****startsWith() : 파라미터로 시작하는지 여부를 boolean으로 리턴
        //https:// 여부에 따라 유효한지 여부를 출력
        let url = "website.com";
        if (url.startsWith("https")) {
            console.log("유효")
        } else {
            console.log("유효하지않음")
        }

        //18.****endsWith() : 파라미터로 끝나는지 여부를 boolean으로 리턴
        console.log(url.endsWith("com")) //true
        if (url.endsWith("com")) {
            console.log("회사")
        }
    </script>
</body>

</html>
