<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /*변수의 종류
        1. var
        - 재선언 가능, 재할당 가능
        - 전역변수 : 덮어쓰기가 가능, 협업시 비추천
        */
        var name = "2학년 3반";
        console.log(name);
        var name = "2학년 4반"; //재선언, 덮어쓰기
        console.log(name);

        var x = 5;
        var y = 7;
        var z = x + y;
        console.log("z : ", z);
        x = 9; //재할당
        z = x - y;
        console.log("z : ", z);

        /*2. let
        - ES6이후 등장
        - 재선언 불가능 => 권장
        - 재할당 가능
        */

        let x1 = 10;
        let y1 = 7;
        let z1 = x1 + y1;
        console.log("z1 : ", z1);

        //let x1 = 9;
        //Uncaught SyntaxError: Identifier 'x1'has already been declared

        x1 = 9; //재할당 가능
        y1 = 11;
        z1 = x1 - y1;
        console.log("z1 : ", z1);

        /*
        3. const
        - SE6이후 등장
        - 재선언, 재할당 모두 불가능
        - 상수 선언에 활용
        - 자바에서의 final과 같다
        */

        const PI = 3.14;
        PI = 3;
        const dateFormat = "DD-MM-YYYY";
        
    </script>
</body>

</html>
