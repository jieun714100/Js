<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /*
        for(statement1; statement2; statement3){
            조건절이 참인 동안 실행할 코드
        }
            statement1 : 코드 블록을 실행하기 전에 무조건 한 번 실해하는 초기화 문장
            statement2 : 코드 블록을 실행시킬 조건절
            statement3 : 코드 블록을 실행한 후 실행되는 횟수 증감 코드

            st1 => st2? true =>구문->st3=>st2? true =>증감
        */
        let brands = ["애플", "구글", "아마존", "마이크로소프트", "메타"]

        const sizeBrands = brands.length;
        for (let i = 0; i < sizeBrands; i++) {
            console.log(brands[i])
        }
        //for문을 이용하여 자판기에서 구입 가능한 음료 구하기

        const drinkList = [
            { name: "오렌지", price: 1000 },
            { name: "파워에이드", price: 1200 },
            { name: "커피", price: 700 },
            { name: "보리음료", price: 1200 },
            { name: "코카콜라", price: 1800 },
        ];
        let inputCoin = 1000;

        for (let i = 0; i < drinkList.length; i++) {
            if (drinkList[i].price <= inputCoin) {
                console.log(drinkList[i].name);
            }
        }


        let arr = [];
        for (let i = 0; i < drinkList.length; i++) {
            if (drinkList[i].price <= inputCoin) {
                arr.push(drinkList[i].name)
            }
        }
        console.log("구입 가능 음료: ", arr)


        //선생님 코드
        let availableDrink = []; //구입 가능한 음료 저장하는 배열
        for (let i = 0; i < drinkList.length; i++) {
            let drink = drinkList[i]; //음료수 객체들이 저장되는 변수(내 코드와 다른점)
            if (inputCoin >= drink.price) {
                availableDrink.push(drink.name);
            }
        }
        console.log("구입 가능 음료:", availableDrink)

        //break : 조건문이나 반복문을 종료
        for (let i = 0; i < 10; i++) {
            if (i === 5) {
                break;
            } else {
                console.log(i)
            }
        }
        //continue : 해당 단계는 건너고 다음 step으로
        for (let i = 0; i < 10; i++) {
            if (i === 5) {
                continue;
            } else {
                console.log(i)
            }
        }

    </script>
</body>

</html>
