<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /* forEach
        - 배열에서 많이 사용
        - 매개변수로 함수 이용
        - 배열.forEach(function(매개변수...,인덱스){})
        */
        let brands = ["애플", "구글", "아마존", "마이크로소프트", "메타"];
        brands.forEach(function (brand) {
            console.log(brand)
        })

        brands.forEach(function (brand, index) {
            console.log(index, brand)
        })

        //활용
        let myScores = [100, 98, 78, 90, 78, 88]
        let total = 0;
        myScores.forEach(function (score) {
            total += score;
        })
        console.log("총점: ", total, "평균: ", total / myScores.length)

        myScores.forEach((score) => {
            total += score;
        })

    </script>
</body>

</html>
