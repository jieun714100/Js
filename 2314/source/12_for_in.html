<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let brands = ["애플", "구글", "아마존", "마이크로소프트", "메타"]
        for (const i in brands) {
            //i 인덱스 => 배열에서 그다지 많이 사용하지 않는다.
            //iterable data(순서가 있는 데이터)에서 >>순회<<한다 
            console.log(i)
            console.log(brands[i])
        }
        //for in은 객체에서 많이 사용한다.
        let person = {
            name: "홍길동",
            age: 22,
            tel: "010-0000-1111",
            city: "Seoul",
        };
        //키를 읽어오기
        for (const key in person) {
            console.log(key)
        }
        //값을 읽어오기
        for (const key in person) {
            console.log(key, ":", person[key])
        }
    </script>
</body>

</html>
