<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /*배열
        - 하나 이상의 데이터를 담을 수 있다
        - 데이터에는 순서가 존재한다.
        - [ ]
        - 어떤 데이터도 >>함께<< 올 수 있다
        - 생성하는 순간 속성(property) 중 length가 자동으로 생성
        */

        let nums = [1, 2, 3, 4, 5];
        let str = ["a", "b", "c"];
        let mix = [3, 5.6, false, [3, 4, 5], { name: "공은성" }];
        console.log(nums);
        console.log(str);
        console.log(mix);

        console.log(nums.length);
        console.log(str.length);
        console.log(mix.length);


        console.log(mix[4]);
        console.log(mix[3]);

        //1. 배열 요소의 수정
        nums[4] = 6
        console.log(nums)

        //2. 배열의 내장 함수(pop(), push()) 
        // pop - 가장 마지막 값 꺼내기 (매개변수 x)
        // push - 끝에 넣고자 하는 값 넣기 (매개변수 o)
        // >> 매개변수(parameter) - 함수를 실행하기위해 전달하는 값
        //  java 매개변수 선언2개 - 보내는 값 2개 ->js는 상관 없다.
        //LIFO(Last In First Out)
        console.log(mix.pop())
        console.log(mix);
        console.log(mix.pop())
        console.log(mix);
        console.log(mix.pop())
        console.log(mix);
        console.log(mix.pop())
        console.log(mix);

        mix.push(4.5);
        console.log(mix);
        mix.push({ name: "공은성" });
        console.log(mix);
        mix.push(["a", "b"]);
        console.log(mix);

        console.log(mix.push('{name : "공은성"}'));

        //4. 배열의 특정 요소를 수정
        console.log("여기")
        mix[2] = 100;
        //console.log(mix)
        mix[2] = null; //100을 null로 바꾸기 - 100지우기
        console.log(mix)
        //delete (mix[2]) //2번 인덱스 삭제
        console.log(mix)
        //delete mix[2]; //2번 인덱스 비우기

        /*3. 활용
        - object와 함께 사용
        - 예를 들어 우리가 개발한 웹사이트에서 사용자 목록을 가져와 처리를 한다고 가정하자,
        json에서 날아와서 맵핑
        */
        // let userList = [{}, {}, {}]; //선언만 하고 할당 x
        // console.log(userList.length);
        // userList[0]; //첫번째 고객
        // console.log([1].name); //두번째 고객의 이름


        // let a = [];
        // console.log(a); // Array(0)
        // console.log(a.length); // 0
        // //배열에 값이 없으면 undefined가 아닌 0이 나온다

        let userList = [{
            name: "정국",
            gender: "남자",
            email: "jung@gmail.com",
            phone: "000-1111-1111",
        }, {
            name: "뷔",
            gender: "남자",
            email: "vui@gmail.com",
            phone: "000-2222-1111",
        }, {
            name: "로제",
            gender: "여자",
            email: "rose@gmail.com",
            phone: "000-3333-1111",
        }]

        console.log(userList);
        console.log(userList[2].phone); //로제 전화번호 출력

        let who = prompt("누구의 전화번호를 알고싶나요?");
        console.log(who);

        if (who === "정국") {
            console.log(userList[0].phone);
        } else if (who === "뷔") {
            console.log(userList[1].phone);
        } else if (who === "로제") {
            console.log(userList[2].phone);
        }

    </script>

</body>

</html>
