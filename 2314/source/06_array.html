<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /*배열
        - 하나 이상의 데이터를 담을 수 있다
        - 데이터에는 순서가 존재한다.
        - [ ]
        - 어떤 데이터도 >>함께<< 올 수 있다
        - 생성하는 순간 속성(property) 중 length가 자동으로 생성
        */

        let nums = [1, 2, 3, 4, 5];
        let str = ["a", "b", "c"];
        let mix = [3, 5.6, false, [3, 4, 5], { name: "공은성" }];
        console.log(nums);
        console.log(str);
        console.log(mix);

        console.log(nums.length);
        console.log(str.length);
        console.log(mix.length);

        console.log(mix[4]);
        console.log(mix[3]);

        //1. 배열 요소의 수정
        nums[4] = 6
        console.log(nums)

        //2. 배열의 내장 함수(pop(), push()) 
        // pop - 가장 마지막 값 꺼내기 (매개변수 x)
        // push - 끝에 넣고자 하는 값 넣기 (매개변수 o)
        // >> 매개변수(parameter) - 함수를 실행하기위해 전달하는 값
        //  java 매개변수 선언2개 - 보내는 값 2개 ->js는 상관 없다.
        //LIFO(Last In First Out)
        console.log(mix.pop())
        console.log(mix);
        console.log(mix.pop())
        console.log(mix);
        console.log(mix.pop())
        console.log(mix);

        console.log(mix.push('{name : "공은성"}'));

        /*3. 활용
        - object와 함께 사용
        - 예를 들어 우리가 개발한 웹사이트에서 사용자 목록을 가져와 처리를 한다고 가정하자,
        json에서 날아와서 맵핑
        */
        let userList = [{}, {}, {}]; //선언만 하고 할당 x
        console.log(userList.length);
        userList[0]; //첫번째 고객
        console.log([1].name); //두번째 고객의 이름

    </script>

</body>

</html>
