<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /* 1. while
        - 조건이 참인동안 반복
        - 무한 루프 조심
        - 한 번도 실행하지 않을 수도 있다.
        */

        let i = 0;
        while (i < 10) {
            console.log(i)
            i++
        }
        console.log(i) //10

        //2. do while : 반드시 1번은 실행
        do {
            console.log("do while:", i)
            i++
        } while (i < 10);

        //3. 활용
        //동전 교환기 코드
        // 7900원 입력받에 500원짜리 n개, 거스름돈 n원

        let inputMoney = 8000;
        let coinUnit = 500;
        let countCoin = 0;

        while (inputMoney >= 500) {
            countCoin++;
            inputMoney -= coinUnit
        }
        console.log("500원", countCoin, "개, 거스름돈 ", (inputMoney), "원")

    </script>
</body>

</html>
